name: Refresh Inderes tokens

# Periodic OAuth refresh against Inderes' Keycloak. Pulls latest tokens from
# the configured private gist, rotates them, pushes the new ones back. Keeps
# the SSO session alive so it doesn't hit idle-timeout, and keeps the gist
# (which the Streamlit Cloud deployment reads on cold start) always-fresh.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   INDERES_TOKENS_GIST_ID   - hex ID of the private tokens gist
#   INDERES_TOKENS_GH_TOKEN  - GitHub PAT with Gists: Read+Write scope
#
# Cadence rationale:
#   Keycloak's SSO-session idle-timeout is 30 min. Refreshing every 5 min
#   keeps the session continuously active even when GitHub Actions skips
#   several scheduled runs (which is common on free-tier public repos at
#   peak load — observed gaps of 30-60 min, occasional 4 h gaps overnight).
#   At */5, GitHub would have to skip 6 runs in a row before we lose the
#   idle window.
#
#   Caveat: Keycloak also enforces an SSO-session MAX timer (wall-clock
#   cap, typically 8-12 h, independent of refresh activity). When that
#   ticks over, the cron sees `error: "Session not active"` and can't
#   recover — manual browser relogin is required. After relogging in,
#   propagate the fresh tokens to the gist with:
#     python scripts/sync_local_tokens_to_gist.py
#
#   ~288 runs/day, ~30 s each → ~2.5 h/day. GitHub Actions on public
#   repos is free with no minute cap, so cadence is constrained only by
#   "don't be a bad neighbor".
#
# Manual trigger: workflow_dispatch lets you fire one off on demand from
# the Actions tab — useful right after a fresh local relogin to verify the
# new tokens propagate correctly.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Don't queue up multiple runs if a previous one is slow — we'll catch
    # the next 5-min slot.
    concurrency:
      group: refresh-inderes-tokens
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install httpx
        run: pip install --quiet httpx

      - name: Refresh tokens
        env:
          INDERES_TOKENS_GIST_ID: ${{ secrets.INDERES_TOKENS_GIST_ID }}
          INDERES_TOKENS_GH_TOKEN: ${{ secrets.INDERES_TOKENS_GH_TOKEN }}
        run: python scripts/refresh_inderes_tokens.py
